# Config file for SimpleFTPSync

sync-interval: 300 # Synchronization interval in seconds
sync-type: "SFTP" # FTP, FTPS, or SFTP
sync-on-startup: false
sync-only-changed: true
change-detection: "CHECKSUM" # CHECKSUM or METADATA

# Optional legacy single-path fallback.
# If sync-folders is empty, the plugin will use local-path plus the selected
# protocol's remote-path value.
local-path: ""

# FTP server configuration
ftp:
  server: ""
  port: 21
  username: ""
  password: ""
  remote-path: ""

# SFTP server configuration
sftp:
  server: ""
  port: 22
  username: ""
  password: ""
  remote-path: ""
  strict-host-key-checking: true
  known-hosts-file: "plugins/SimpleFTPSync/known_hosts"

# FTPS server configuration
ftps:
  server: ""
  port: 21
  username: ""
  password: ""
  remote-path: ""

# List of files or folders to synchronize.
# This list is the preferred format and supports recursive directory uploads.
# Each entry remote-path may be:
# - relative to the selected protocol remote-path, like "world"
# - fully absolute, like "/C:/MinecraftSync/world" or "/backups/world"
# Leave it empty until you are ready to configure a real sync target.
sync-folders: []

# Example:
# sync-folders:
#   - local-path: "world"
#     remote-path: "world"
#     changed-only: true
#     exclude:
#       - "**/session.lock"
#   - local-path: "plugins/ExamplePlugin/data"
#     remote-path: "example-plugin"
#     include:
#       - "**/*.yml"
